# ===== Database =====
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:${MYSQL_URL}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
quarkus.datasource.username=${MYSQLUSER}
quarkus.datasource.password=${MYSQLPASSWORD}
quarkus.datasource.jdbc.connection-timeout=60s
quarkus.datasource.jdbc.idle-removal-interval=15m
quarkus.datasource.jdbc.acquisition-timeout=30s
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.validation-query=SELECT 1
quarkus.datasource.jdbc.validation-interval=30s
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.mapping.preferred-uuid-jdbc-type=char

# ===== Flyway =====
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.repair-at-start=true

# ===== JWT =====
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=${JWT_ISSUER:https://voeux.ro}
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem
quarkus.smallrye-jwt.token.header=Authorization
quarkus.smallrye-jwt.token.scheme=Bearer

# ===== Redis =====
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# ===== External APIs =====
resend.api.key=${RESEND_API_KEY:placeholder}
resend.api.url=${RESEND_API_URL:https://api.resend.com}
# stripe.secret.key=${STRIPE_SECRET_KEY}
# stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
supabase.url=${SUPABASE_URL:placeholder}
supabase.service.key=${SUPABASE_SERVICE_KEY:placeholder}

# ===== REST Clients =====
quarkus.rest-client."ro.eternelle.client.ResendClient".url=${resend.api.url}

# ===== Logging =====
quarkus.log.category."ro.eternelle.vendor.VendorService".level=DEBUG
quarkus.log.category."io.agroal".level=DEBUG

# ===== CORS =====
# Handled by Quarkus built-in CORS (Vert.x layer — not CDI, immune to hot-reload
# classloader conflicts caused by @ServerRequestFilter/@ServerResponseFilter beans).
# Override CORS_ORIGINS env var in production (comma-separated list of allowed origins).
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Accept,Authorization,Content-Type,X-Requested-With
quarkus.http.cors.exposed-headers=Authorization
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=86400S

# ===== Auth =====
# Set to true in production after wiring email-verification flow end-to-end
app.auth.require-email-verification=true

# ===== Email =====
app.email.from=Eternelle <noreply@eternelle.ro>
# Dev override: Resend only allows sending from onboarding@resend.dev without a verified domain
%dev.app.email.from=Eternelle <onboarding@resend.dev>
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ===== Scheduler =====
quarkus.scheduler.enabled=true

# ===== JaaS (Jitsi as a Service) =====
# Sign up at https://jaas.8x8.vc and create an app to get these values.
# Private key lives at src/main/resources/META-INF/resources/jaas-private.pem
jaas.app.id=${JAAS_APP_ID:placeholder}
jaas.kid=${JAAS_KID:placeholder}

# ===== OpenAPI / Swagger UI =====
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi
